services:

  # ── Reverse Proxy ──────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: anticifi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - anticifi-network

  # ── Backend API ────────────────────────────────────────

  backend:
    build: ./backend
    container_name: anticifi-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - anticifi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── ML Service ─────────────────────────────────────────

  ml-service:
    build: ./ml-service
    container_name: anticifi-ml-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    networks:
      - anticifi-network

  # ── Infrastructure Services ────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: anticifi-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-anticifi_dev}
      POSTGRES_USER: ${DB_USER:-anticifi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-anticifi_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - anticifi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-anticifi} -d ${DB_NAME:-anticifi_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anticifi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --save 21600 1 --loglevel warning
    networks:
      - anticifi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: anticifi-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - anticifi-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  anticifi-network:
    driver: bridge
