services:

  # ── Backend API ────────────────────────────────────────
  backend:
    build: ./backend
    container_name: anticifi-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - anticifi-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: anticifi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - anticifi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: anticifi-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    command: redis-server --save 21600 1 --loglevel warning
    networks:
      - anticifi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NATS ───────────────────────────────────────────────
  nats:
    image: nats:2-alpine
    container_name: anticifi-nats
    restart: unless-stopped
    networks:
      - anticifi-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  anticifi-network:
    driver: bridge
