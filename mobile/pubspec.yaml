name: anticifi
description: AnticiFi - AI-powered financial assistant.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_bloc: ^8.1.0
  go_router: ^6.0.0
  dio: ^5.0.0
  get_it: ^7.2.0
  flutter_secure_storage: ^9.2.0
  google_fonts: ^6.0.0
  equatable: ^2.0.0
  file_picker: ^8.0.0
  intl: ^0.20.2
  fl_chart: ^0.69.0
  plaid_flutter: ^3.0.0
  firebase_core: 2.24.2
  firebase_messaging: 14.7.9
  flutter_local_notifications: ^17.0.0
  local_auth: ^2.1.0
  image_picker: ^1.0.0
  share_plus: ^7.0.0
  path_provider: ^2.0.0
  flutter_animate: ^4.3.0
  sqflite: ^2.2.0
  connectivity_plus: ^4.0.0
  path: ^1.8.0
  purchases_flutter: ^6.0.0
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.0
  mocktail: ^1.0.0

  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon_1024.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon_1024.png"
  macos:
    generate: true
    image_path: "assets/images/app_icon_1024.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
